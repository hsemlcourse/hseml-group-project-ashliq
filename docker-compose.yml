services:
  notebook:
    build: .
    container_name: movies-ml-notebook
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8888:8888"
    env_file:
      - .env.example
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=
